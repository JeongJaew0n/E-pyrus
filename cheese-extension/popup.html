<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Cheese Crawler</h1>
    <button type="button" id="btn-newtab" class="icon-btn" title="새 탭에서 열기">⧉</button>
  </div>
  <form id="crawler-form">
    <label for="url">URL</label>
    <input type="text" id="url" placeholder="https://booktoki..." required>

    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" id="multi-page">
        여러 페이지 다운로드
        <span class="help-icon" data-tooltip="목록이 여러 페이지에 걸쳐 있을 때 사용. URL의 spage 파라미터를 1부터 입력한 페이지 수까지 자동 생성합니다.">?</span>
      </label>
      <div id="page-count-wrap" class="hidden">
        <label for="page-count">페이지 수</label>
        <input type="number" id="page-count" min="2" placeholder="2">
      </div>
    </div>

    <div class="row">
      <div>
        <label>
          시작 회차
          <span class="help-icon" data-tooltip="크롤링 범위의 첫 번째 회차 번호 (예: 1화부터라면 1)">?</span>
        </label>
        <input type="number" id="range-start">
      </div>
      <div>
        <label>
          끝 회차
          <span class="help-icon" data-tooltip="크롤링 범위의 마지막 회차 번호 (예: 200화까지라면 200)">?</span>
        </label>
        <input type="number" id="range-end">
      </div>
    </div>

    <div class="buttons">
      <button type="submit" id="btn-start">크롤링 시작</button>
      <button type="button" id="btn-stop" disabled>중단</button>
      <button type="button" id="btn-save">저장</button>
      <button type="button" id="btn-load">불러오기</button>
    </div>
  </form>

  <div id="progress" class="hidden">
    <div class="progress-info">
      <span id="progress-text">0 / 0</span>
      <span id="progress-title"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <pre id="output"></pre>
  <script src="popup.js"></script>
</body>
</html>
