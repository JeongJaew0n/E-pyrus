<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Cheese Crawler</h1>
    <button type="button" id="btn-newtab" class="icon-btn" title="새 탭에서 열기">⧉</button>
  </div>
  <form id="crawler-form">
    <label for="url">URL:</label>
    <input type="text" id="url" name="url" required>

    <label>저장 폴더</label>
    <div class="folder-picker">
      <input type="text" id="save-folder" readonly placeholder="클릭하여 폴더 선택">
      <button type="button" id="btn-folder">찾아보기</button>
    </div>

    <div class="row">
      <div>
        <label>
          시작 회차
          <span class="help-icon" data-tooltip="크롤링 범위의 첫 번째 회차 번호 (예: 1화부터라면 1)">?</span>
        </label>
        <input type="number" id="range-start">
      </div>
      <div>
        <label>
          끝 회차
          <span class="help-icon" data-tooltip="크롤링 범위의 마지막 회차 번호 (예: 200화까지라면 200)">?</span>
        </label>
        <input type="number" id="range-end">
      </div>
      <div>
        <label>
          이어받기
          <span class="help-icon" data-tooltip="중단된 지점부터 재개할 회차 번호 (예: 123화부터 이어받기)">?</span>
        </label>
        <input type="number" id="jump-number">
      </div>
    </div>

    <div class="buttons">
      <button type="submit" id="btn-start">크롤링 시작</button>
      <button type="button" id="btn-stop" disabled>중단</button>
      <button type="button" id="btn-save">저장</button>
      <button type="button" id="btn-load">불러오기</button>
    </div>
  </form>

  <div id="progress" class="hidden">
    <div class="progress-info">
      <span id="progress-text">0 / 0</span>
      <span id="progress-title"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <pre id="output"></pre>
  <script src="popup.js"></script>
</body>
</html>
